name: .NET Core Desktop Build and Release

on:
  push:
    tags:
      - 'v*' # 当你推送形如 v1.0, v2.0 的标签时，会自动触发并创建 Release

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_Name: HabitTrack.sln
      Wpf_Project_Path: HabitTrack/HabitTrack.csproj
      Configuration: Release

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Setup MSBuild for .NET Framework
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    # Restore NuGet packages
    - name: Restore the application
      run: msbuild ${{ env.Solution_Name }} -t:Restore

    # Build the WPF project
    - name: Build HabitTrack
      run: msbuild ${{ env.Wpf_Project_Path }} -p:Configuration=${{ env.Configuration }} -p:Platform=AnyCPU

    # Upload EXE to Release
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: HabitTrack/bin/${{ env.Configuration }}/HabitTrack.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
