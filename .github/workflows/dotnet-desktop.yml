name: .NET Core Desktop Build and Release

on:
  push:
    tags:
      - 'v*' # 当你推送形如 v1.0, v2.0 的标签时，会自动触发并创建 Release

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_Name: HabitTrack.sln
      Wpf_Project_Path: HabitTrack/HabitTrack.csproj
      Configuration: Release

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 安装 .NET 环境
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x # 如果你使用的是 .NET 6 或 7，可以改成对应的版本

    # 还原依赖
    - name: Restore the application
      run: dotnet restore ${{ env.Solution_Name }}

    # 编译 WPF 项目为独立的单文件 Exe 
    - name: Build and Publish HabitTrack
      run: |
        dotnet publish ${{ env.Wpf_Project_Path }} -c ${{ env.Configuration }} -r win-x64 --self-contained false -o ./publish_output
