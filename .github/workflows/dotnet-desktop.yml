name: .NET Framework Desktop Build and Release

on:
  push:
    tags:
      - 'v*' # 当你推送形如 v1.0, v2.0 的标签时，会自动触发并创建 Release

jobs:
  build:
    runs-on: windows-latest

    # 显式声明赋予此任务写权限，防止创建 Release 时报错
    permissions:
      contents: write

    env:
      Solution_Name: HabitTrack.sln
      Wpf_Project_Path: HabitTrack/HabitTrack.csproj
      Configuration: Release

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 配置并添加 MSBuild 到环境变量
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 2. 还原 NuGet 依赖包
    - name: Restore NuGet Packages
      run: msbuild ${{ env.Solution_Name }} -t:Restore

    # 3. 编译整个 WPF 项目
    - name: Build HabitTrack
      run: msbuild ${{ env.Wpf_Project_Path }} -p:Configuration=${{ env.Configuration }} -p:Platform=AnyCPU

    # 4. 将 Release 文件夹内的所有依赖项和 exe 一起压缩成一个 zip 包
    - name: Zip Release Folder
      run: |
        Compress-Archive -Path HabitTrack/bin/${{ env.Configuration }}/* -DestinationPath ./HabitTrack_Release.zip

    # 5. 将完整的 zip 压缩包上传到 GitHub Release
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: ./HabitTrack_Release.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
